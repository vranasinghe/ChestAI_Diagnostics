name: ChestAI CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # CONTINUOUS INTEGRATION (CI)
  # ==========================================
  frontend-ci:
    name: Build & Check Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your README badge
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci # Faster and more reliable than npm install in CI
        
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  backend-ci:
    name: Build & Check Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Matches your README badge
          cache: 'pip'
          
      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # Uncomment if you add Pytest tests in the future
      # - name: Run Backend Tests
      #   working-directory: ./backend
      #   run: pytest

  docker-ci:
    name: Test Docker Compose Build
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Verify Docker Compose Build
        run: docker-compose build

  # ==========================================
  # CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: docker-ci
    # Only deploy when pushing to the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          production: true

  deploy-backend:
    name: Deploy Backend & DB via SSH
    runs-on: ubuntu-latest
    needs: docker-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /path/to/your/deployment/XRAY-ML-system
            git pull origin main
            
            # Rebuild images and restart containers dynamically
            docker-compose up -d --build
            
            # Clean up old dangling Docker images to save space
            docker image prune -f
